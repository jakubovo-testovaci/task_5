name: Docker Build and Test

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

env:
  IMAGE_NAME: python-calculator

jobs:
  build-and-test:
    runs-on: ubuntu-latest    

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'    

    - name: Run unit tests
      run: |
        echo "🧪 Spouštění unit testů..."
        python -m unittest test_calculator.py -v    

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      run: |
        echo "🐳 Buildování Docker image..."
        docker build -t $IMAGE_NAME:latest .
        docker build -t $IMAGE_NAME:${{ github.sha }} .

    - name: Test Docker container and store logs
      run: |
        echo "🚀 Testování Docker kontejneru..."
        mkdir /tmp/mylogs
        docker run --rm $IMAGE_NAME:latest > /tmp/mylogs/log_run.txt
        docker run --rm $IMAGE_NAME:latest bash -c "python ./test_calculator.py -v" > /tmp/mylogs/log_test.txt 2>&1

    - name: List Docker images
      run: |
        echo "📋 Seznam vytvořených images:"
        docker images | grep $IMAGE_NAME

    - name: Upload logs    
      uses: actions/upload-artifact@v4
      with:
         name: logs
         path: /tmp/mylogs
